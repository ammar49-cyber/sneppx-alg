extends: default
rules:
  line-length:
    max: 120
    level: warning
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  indentation:
    spaces: 4
    indent-sequences: true
  document-start: disable
  truthy:
    allowed-values: [true, false, on, off]
