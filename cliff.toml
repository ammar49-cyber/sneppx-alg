# git-cliff changelog configuration
[changelog]
header = "# Changelog\n\nAll notable changes to ARIX-Algo are documented here.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.scope %} ({{ commit.scope }}){% endif %}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = "---\n\n_Release timestamp: {{ timestamp }}_"

[git]
conventional_commits = true
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Testing" },
    { message = "^ci", group = "CI/CD" },
    { message = "^perf", group = "Performance" },
    { message = "^style", group = "Style" },
    { message = "^chore", group = "Chores" },
    { message = ".*", group = "Other" },
]
