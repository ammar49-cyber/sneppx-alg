# GitHub Packages — Docker and Python package publishing for sneppx-alg

name: GitHub Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ammar49-cyber
  PYTHON_VERSION: "3.11"

jobs:
  # =====================================================================
  # Docker — sneppx-alg CPU
  # =====================================================================
  docker-cpu:
    name: Docker (CPU)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/sneppx-alg
          tags: |
            type=ref,event=tag
            type=raw,value=cpu
            type=raw,value=cpu-latest
            type=sha,prefix=cpu-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cpu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================================
  # Docker — sneppx-alg CUDA (disabled; requires DOCKER_USERNAME/PASSWORD
  # secrets. To enable, uncomment this block and set repo secrets.)
  # =====================================================================

  # =====================================================================
  # Python — Build wheel and upload to release
  # =====================================================================
  python-publish:
    name: Python (wheel)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          pip install --no-cache-dir build

      - name: Build wheel
        run: |
          cd bindings/python
          python -m build --wheel --no-isolation

      - name: Upload wheel to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bindings/python/dist/*.whl

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: bindings/python/dist/*.whl
          retention-days: 90
