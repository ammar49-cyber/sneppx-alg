name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  windows-msvc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j4
      - name: Test security libs
        run: |
          cd build
          ctest -C ${{ env.BUILD_TYPE }} -R "test_(kyber|dilithium|sphincsplus|differential_privacy|ddos|container|fuzzer|memory_leak|breakout|rlhf)" --output-on-failure --timeout 30

  windows-python:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pybind11 numpy
      - name: Build Python bindings
        run: |
          cmake -B build_py -DARIX_BUILD_PYTHON=ON -DARIX_USE_LTO=OFF
          cmake --build build_py --target _arix_c --config ${{ env.BUILD_TYPE }} -j2
      - name: Verify Python bindings
        run: python -c "import sys, numpy as np; sys.path.insert(0, 'bindings/python'); from arix_algo import _arix_c as ax; t = ax._Tensor.zeros(np.array([2,3]), ax.FLOAT32); print('Python bindings OK:', t.shape)"

  windows-bench:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake for benchmarks
        run: cmake -B build_bench -DARIX_BUILD_BENCHMARKS=ON -DARIX_BUILD_TESTS=OFF
      - name: Build benchmarks
        run: cmake --build build_bench --target bench_pq_crypto --config ${{ env.BUILD_TYPE }} -j2
      - name: Run PQ benchmarks
        run: build_bench/tests/benchmark/${{ env.BUILD_TYPE }}/bench_pq_crypto.exe
        timeout-minutes: 10

  ubuntu-gcc:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-12 g++-12
      - name: Configure CMake
        run: CC=gcc-12 CXX=g++-12 cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DARIX_USE_ASAN=ON
      - name: Build
        run: cmake --build build -j4
      - name: Test all
        run: cd build && ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 30

  ubuntu-clang:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang-14
      - name: Configure CMake
        run: CC=clang-14 CXX=clang++-14 cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
      - name: Build
        run: cmake --build build -j4
      - name: Test all
        run: cd build && ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 30

  ubuntu-clang-tidy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang-14 clang-tidy-14
      - name: Configure CMake with clang-tidy
        run: |
          CC=clang-14 CXX=clang++-14 cmake -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_CLANG_TIDY=ON
      - name: Build (static analysis)
        run: cmake --build build -j4 2>&1 | head -100

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install cmake
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
      - name: Build
        run: cmake --build build -j4
      - name: Test
        run: cd build && ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 30

  code-coverage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-12 g++-12 lcov
      - name: Configure with coverage
        run: CC=gcc-12 CXX=g++-12 cmake -B build -DENABLE_COVERAGE=ON -DARIX_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build -j4
      - name: Run tests with coverage
        run: cd build && ctest --output-on-failure --timeout 30
      - name: Generate coverage report
        run: |
          lcov --directory build --capture --output-file coverage.info
          lcov --remove coverage.info "/usr/*" --output-file coverage.info
          lcov --remove coverage.info "*/tests/*" --output-file coverage.info
          bash <(curl -s https://codecov.io/bash) -f coverage.info || echo "Codecov upload skipped"

  ubuntu-bench:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-12 g++-12
      - name: Configure benchmarks
        run: CC=gcc-12 CXX=g++-12 cmake -B build_bench -DARIX_BUILD_BENCHMARKS=ON -DARIX_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build_bench -j4
      - name: Run PQ benchmarks
        run: ./build_bench/tests/benchmark/bench_pq_crypto
        timeout-minutes: 15
