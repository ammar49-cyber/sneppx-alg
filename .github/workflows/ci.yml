name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        config: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install deps (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

    - name: Install deps (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake ninja

    - name: Configure
      run: >
        cmake -B build
        -DCMAKE_BUILD_TYPE=${{ matrix.config }}
        -DARIX_BUILD_TESTS=ON
        -DARIX_BUILD_BENCHMARKS=ON
        -DARIX_BUILD_PYTHON=OFF
        -DARIX_USE_LTO=${{ matrix.config == 'Release' && 'ON' || 'OFF' }}
        ${{ runner.os == 'Windows' && '-G "Visual Studio 17 2022" -A x64' || '-G Ninja' }}

    - name: Build
      run: cmake --build build --config ${{ matrix.config }} -j$(nproc)

    - name: Test
      run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure (Release)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DARIX_BUILD_TESTS=OFF -DARIX_BUILD_BENCHMARKS=ON -DARIX_USE_LTO=ON -G Ninja
    - name: Build benchmarks
      run: cmake --build build -j$(nproc) --target bench_tensor bench_autodiff
    - name: Run tensor benchmarks
      run: ./build/tests/benchmark/bench_tensor
    - name: Run autodiff benchmarks
      run: ./build/tests/benchmark/bench_autodiff
