name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        config: [Release, Debug]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DSNEPPX_BUILD_TESTS=ON -DSNEPPX_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Run C tests
        working-directory: build
        run: ctest -C ${{ matrix.config }} --output-on-failure --timeout 60

      - name: Run Python tests
        working-directory: build
        run: |
          cmake -B build_py -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DSNEPPX_BUILD_PYTHON=ON
          cmake --build build_py --config ${{ matrix.config }}
          cd build_py
          ctest -C ${{ matrix.config }} -R "py_" --output-on-failure --timeout 120

  backends:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (opt-in backends)
        run: cmake -B build_be -DCMAKE_BUILD_TYPE=Release -DSNEPPX_BUILD_TESTS=ON -DSNEPPX_BUILD_TOOLS=ON -DSNEPPX_BUILD_VULKAN=ON -DSNEPPX_BUILD_TPU=ON -DSNEPPX_BUILD_HTTP=ON -DSNEPPX_BUILD_ZK=ON -DSNEPPX_BUILD_AMD=ON -DSNEPPX_BUILD_INTEL=ON -DSNEPPX_BUILD_QNN=ON -DSNEPPX_BUILD_NPU=ON -DSNEPPX_BUILD_SGX=ON -DSNEPPX_BUILD_SHIM=ON

      - name: Build
        run: cmake --build build_be --config Release --parallel

      - name: Run C tests
        working-directory: build_be
        run: ctest -C Release --output-on-failure --timeout 120

  l0-validation:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure CMake (minimal, Release)
        run: cmake -B build_l0 -DCMAKE_BUILD_TYPE=Release -DSNEPPX_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build_l0 --config Release --parallel
      - name: Run L0 smoke tests
        working-directory: build_l0
        run: ctest -C Release -R "test_e2e_training_loop|test_gradient_flow|test_backend_full|test_cognitive_memory|test_hashtable|test_pqueue|test_rbtree|test_strutil" --output-on-failure --timeout 120

  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure with ASan
        run: cmake -B build_asan -DCMAKE_BUILD_TYPE=Debug -DSNEPPX_BUILD_TESTS=ON -DSNEPPX_USE_ASAN=ON
      - name: Build with ASan
        run: cmake --build build_asan --config Debug --parallel
      - name: Run tests with ASan
        working-directory: build_asan
        run: ctest --output-on-failure --timeout 60

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-tidy
        run: |
          cmake -B build_tidy -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DSNEPPX_BUILD_TESTS=ON
          cmake --build build_tidy --config Debug --parallel
          run-clang-tidy -p build_tidy -j $(nproc)
      - name: Check formatting
        run: |
          find . -name '*.c' -o -name '*.h' -o -name '*.cpp' | xargs clang-format --dry-run --Werror
