# GitHub Actions CI Workflow
# Runs on every push and PR

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release
  SNEPPX_BUILD_CUDA: ON
  SNEPPX_BUILD_TESTS: ON
  SNEPPX_USE_ASAN: OFF
  SNEPPX_USE_UBSAN: OFF

jobs:
  # =====================================================================
  # Linting and Static Analysis
  # =====================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linting tools
        run: |
          pip install --no-cache-dir \
            clang-format==17.0.6 \
            cmake-format==0.6.13 \
            cpplint==1.6.1 \
            yamllint==1.35.1
          npm install -g markdownlint-cli2 || true

      - name: Check C/C++ formatting
        run: |
          find . -name "*.c" -o -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.cu" -o -name "*.cuh" | \
          grep -v build | grep -v .git | xargs clang-format --dry-run --Werror || true

      - name: Check CMake formatting
        run: |
          find . -name "CMakeLists.txt" -o -name "*.cmake" | grep -v build | xargs cmake-format --check || true

      - name: Check Python formatting
        run: |
          pip install black isort flake8
          black --check bindings/python/SneppX_ALG/interface_bindings/ || true
          isort --check-only bindings/python/SneppX_ALG/interface_bindings/ || true
          flake8 bindings/python/SneppX_ALG/interface_bindings/ || true

      - name: Check YAML/Markdown
        run: |
          yamllint .github/ || true
          markdownlint-cli2 "*.md" "docs/**/*.md" || true

  # =====================================================================
  # Build and Test - Linux (CUDA toolkit installed on runner)
  # =====================================================================
  build-linux:
    name: Build Linux (${{ matrix.build_type }})
    runs-on: ubuntu-22.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: 'network'
          linux-local-args: '["--silent", "--toolkit"]'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            python3 python3-pip python3-dev python3-venv \
            libopenblas-dev libomp-dev \
            wget curl git
          pip install --no-cache-dir numpy

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSNEPPX_BUILD_CUDA=ON \
            -DSNEPPX_BUILD_TESTS=ON \
            -DSNEPPX_BUILD_PYTHON=ON \
            -DSNEPPX_USE_ASAN=OFF \
            -DSNEPPX_USE_UBSAN=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j$(nproc)

      - name: Run C tests
        run: |
          cd build
          ctest -C ${{ matrix.build_type }} --output-on-failure -j$(nproc)

      - name: Install Python package
        run: |
          pip install ./bindings/python

      - name: Run Python tests
        run: |
          python -m pytest tests/python/ -v --tb=short -x

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.build_type }}-cuda
          path: build/
          retention-days: 7

  # =====================================================================
  # Build and Test - macOS (best-effort; CUDA-only sources not built here)
  # =====================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-14
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja openblas libomp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install --no-cache-dir numpy

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DSNEPPX_BUILD_CUDA=OFF \
            -DSNEPPX_BUILD_TESTS=ON \
            -DSNEPPX_BUILD_PYTHON=ON

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Run C tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      - name: Install Python package
        run: pip install ./bindings/python

      - name: Run Python tests
        run: |
          python -m pytest tests/python/ -v --tb=short -x

  # =====================================================================
  # Build and Test - Windows (best-effort)
  # =====================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          choco install -y cmake ninja
          pip install --no-cache-dir numpy

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DSNEPPX_BUILD_CUDA=OFF `
            -DSNEPPX_BUILD_TESTS=ON `
            -DSNEPPX_BUILD_PYTHON=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run C tests
        run: |
          cd build
          ctest -C Release --output-on-failure

      - name: Install Python package
        run: pip install ./bindings/python

      - name: Run Python tests
        run: |
          python -m pytest tests/python/ -v --tb=short -x

  # =====================================================================
  # Python Package Build (CUDA toolkit installed on runner)
  # =====================================================================
  build-python:
    name: Build Python Package
    runs-on: ubuntu-22.04
    continue-on-error: true
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: '12.4.0'
          method: 'network'
          linux-local-args: '["--silent", "--toolkit"]'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libopenblas-dev libomp-dev
          pip install --no-cache-dir build twine numpy

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Verify wheel
        run: |
          ls -la dist/
          pip install dist/*.whl
          python -c "import sneppx_alg; print(sneppx_alg.__version__)"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          retention-days: 30

  # =====================================================================
  # Security Scan (non-blocking)
  # =====================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =====================================================================
  # Build Documentation (non-blocking)
  # =====================================================================
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser breathe exhale || true

      - name: Build docs
        run: |
          cd docs
          make html || true
