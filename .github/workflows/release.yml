name: Release

on:
  push:
    tags:
      - "algo*"

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#algo}"
          git archive --format=tar.gz -o "arixalgo-${VERSION}.tar.gz" HEAD
          git archive --format=zip -o "arixalgo-${VERSION}.zip" HEAD
      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#algo}"
          {
            echo "## ARIX-Algo ${VERSION}"
            echo ""
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~ 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null | sed 's/^/- /' || true
            else
              git log --oneline "$(git rev-list --max-parents=0 HEAD)"..HEAD 2>/dev/null | sed 's/^/- /' || true
            fi
          } > release_notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ARIX-Algo ${{ github.ref_name }}"
          body_path: release_notes.md
          generate_release_notes: true
          files: |
            arixalgo-*.tar.gz
            arixalgo-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
