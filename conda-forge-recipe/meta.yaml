# Conda-forge recipe for sneppx-alg
# This goes in a separate conda-forge feedstock repository

{% set version = "0.9.0" %}

package:
  name: sneppx-alg
  version: {{ version }}

source:
  url: https://github.com/ammar49-cyber/sneppx-alg/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [not (linux or win)]
  skip: true  # [osx]
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  script_env:
    - SNEPPX_BUILD_CUDA=ON
    - SNEPPX_USE_ASAN=OFF
    - SNEPPX_USE_UBSAN=OFF
  skip_existing: true

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.16
    - ninja
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    - numpy
    - cmake
    - ninja
  run:
    - python >=3.9
    - numpy >=1.21
    - {{ pin_compatible('numpy') }}
    - huggingface_hub >=0.16.0  # optional

test:
  imports:
    - sneppx_alg
    - sneppx_alg.interface_bindings
    - sneppx_alg.interface_bindings.tensor
    - sneppx_alg.interface_bindings.nn
    - sneppx_alg.interface_bindings.optim
  commands:
    - python -c "import sneppx_alg; print(sneppx_alg.__version__)"
    - python -c "from sneppx_alg.interface_bindings import Tensor; print('Tensor OK')"
    - python -c "from sneppx_alg.interface_bindings.nn import Linear; print('NN OK')"
    - python -c "from sneppx_alg.interface_bindings.optim import AdamW; print('Optim OK')"

about:
  home: https://github.com/ammar49-cyber/sneppx-alg
  license: MIT
  license_file: LICENSE
  summary: "Next-generation AI architecture with security built into the foundation"
  description: |
    SNEPPX-ALG is a next-generation AI architecture implementing:
    - Core tensor operations with CPU/CUDA backends
    - Neural network modules (Linear, Attention, Normalization, etc.)
    - Optimizers (AdamW, Lion, LAMB, Sophia, etc.)
    - Advanced models (ViT, DeiT, Swin, MAE)
    - Quantization (INT8, FP8, AWQ, GPTQ)
    - Distributed training (ZeRO, Pipeline, Tensor Parallel)
    - Security features (S0-S9 layers)
  doc_url: https://github.com/ammar49-cyber/sneppx-alg
  dev_url: https://github.com/ammar49-cyber/sneppx-alg

extra:
  recipe-maintainers:
    - ammar49-cyber